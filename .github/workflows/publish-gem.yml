name: Release

on:
  push:
    branches:
      - main
    paths:
      - lib/minitest/bonus_assertions/version.rb

  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - lib/minitest/bonus_assertions/version.rb

  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release minitest-bonus-assertions
    if: github.repository == 'halostatue/minitest-bonus-assertions' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged))

    runs-on: ubuntu-latest
    environment: release

    env:
      rubygems_release_gem: true

    permissions:
      contents: write # Create a new tag
      id-token: write # Authenticate for gem publishing

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            fulcio.sigstore.dev:443
            github.com:443
            index.rubygems.org:443
            objects.githubusercontent.com:443
            rekor.sigstore.dev:443
            release-assets.githubusercontent.com:443
            rubygems.org:443
            tuf-repo-cdn.sigstore.dev:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - id: rubygems
        run: |
          ruby -e \
            'print "version=", Gem::Specification.load(ARGV[0]).rubygems_version, "\n"' \
            minitest-bonus-assertions.gemspec >>"${GITHUB_OUTPUT}"

      - uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1.299.0
        with:
          bundler-cache: false
          ruby-version: ruby

      - name: Install dependencies
        run: |
          gem update --system="${RUBYGEMS_VERSION}"
          bundle install --jobs 4 --retry 3
        env:
          RUBYGEMS_VERSION: ${{ steps.rubygems.outputs.version }}

      - uses: rubygems/release-gem@6317d8d1f7e28c24d28f6eff169ea854948bd9f7 # v1.2.0

      - name: Show the status if release failed
        if: failure()
        run: |
          git status
          git diff

  publish_docs:
    needs: release
    permissions:
      contents: read
      pages: write    # Publish documentation
      id-token: write # Authenticate for gem publishing
    uses: ./.github/workflows/publish-docs.yml
